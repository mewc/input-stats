name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # tags needed so build.sh can derive the version

      - name: Build (ad-hoc signed)
        run: ./build.sh --release

      - name: Create zip
        run: ditto -c -k --keepParent "Input Stats.app" InputStats.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: InputStats.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download `InputStats.zip` below and unzip it.
            2. Move **Input Stats.app** to `/Applications`.
            3. Because this is ad-hoc signed (not notarized), first launch is blocked by Gatekeeper.
               Either **right-click the app → Open** (then confirm), or run:
               ```
               xattr -cr "/Applications/Input Stats.app"
               ```
            4. Grant **Accessibility** permission when prompted
               (System Settings → Privacy & Security → Accessibility).
