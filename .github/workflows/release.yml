name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # tags needed so build.sh can derive the version

      # Import a stable self-signed code-signing cert from secrets into a throwaway keychain.
      # Signing every release with the SAME cert keeps the app's TCC "designated requirement"
      # constant, so the Accessibility grant persists across updates (no re-grant each version).
      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          printf '%s' "$CERT_P12_BASE64" | openssl base64 -A -d > "$RUNNER_TEMP/cert.p12"
          echo "decoded p12 bytes: $(wc -c < "$RUNNER_TEMP/cert.p12")"
          security import "$RUNNER_TEMP/cert.p12" -f pkcs12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so codesign resolves the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "SIGNING_IDENTITY=InputStats-Release" >> "$GITHUB_ENV"

      - name: Build (stable self-signed identity)
        run: ./build.sh --release

      - name: Create zip
        run: ditto -c -k --keepParent "Input Stats.app" InputStats.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: InputStats.zip
          generate_release_notes: true
          body: |
            ## Install

            1. Download `InputStats.zip` below and unzip it.
            2. Move **Input Stats.app** to `/Applications`.
            3. Because this is self-signed (not notarized), first launch is blocked by Gatekeeper.
               Either **right-click the app → Open** (then confirm), or run:
               ```
               xattr -cr "/Applications/Input Stats.app"
               ```
            4. Grant **Accessibility** permission when prompted
               (System Settings → Privacy & Security → Accessibility).
